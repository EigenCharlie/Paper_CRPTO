project:
  type: book
  output-dir: _book

quarto-required: ">=1.9.0"

book:
  title: "CRPTO"
  subtitle: "Auditoría de identificación en ML, conformal prediction y asignación crediticia"
  author: "Carlos Alfredo Vergara Rojas"
  description: "Companion técnico del CRPTO activo: diseño temporal, geometría conformal binaria, asignación y evidencia reproducible sobre Lending Club."
  site-url: "https://eigencharlie.github.io/Paper_CRPTO/"
  favicon: assets/logo-small.svg
  image: "https://eigencharlie.github.io/Paper_CRPTO/assets/logo.svg"
  image-alt: "Identidad visual de CRPTO."
  open-graph:
    image: "https://eigencharlie.github.io/Paper_CRPTO/assets/logo.svg"
    image-alt: "Identidad visual de CRPTO."
    locale: es_CO
  twitter-card:
    image: "https://eigencharlie.github.io/Paper_CRPTO/assets/logo.svg"
    image-alt: "Identidad visual de CRPTO."
    card-style: summary
  search:
    location: sidebar
    type: textbox
    show-item-context: true
    collapse-after: 4
    copy-button: true
  page-navigation: true
  back-to-top-navigation: true
  bread-crumbs: true
  reader-mode: true
  repo-url: "https://github.com/EigenCharlie/Paper_CRPTO"
  repo-branch: main
  repo-subdir: book
  repo-actions: [edit, issue]
  sidebar:
    style: docked
    logo: assets/logo.svg
    logo-alt: "CRPTO"
    collapse-level: 2
    tools:
      - icon: github
        text: GitHub
        href: "https://github.com/EigenCharlie/Paper_CRPTO"
      - icon: database
        text: DagsHub
        href: "https://dagshub.com/EigenCharlie94/Paper_CRPTO"
  page-footer:
    left: "Carlos Alfredo Vergara Rojas · CRPTO · 2026"
    right: "[GitHub](https://github.com/EigenCharlie/Paper_CRPTO) · [DagsHub](https://dagshub.com/EigenCharlie94/Paper_CRPTO) · [Quarto](https://quarto.org)"
  chapters:
    - index.qmd
    - part: "Companion del manuscrito IJDS activo"
      chapters:
        - chapters/06-blueprint-manuscrito.qmd
        - chapters/06b-guia-editorial-claims.qmd
    - references.qmd

lang: es
bibliography: ../paper/references.bib
csl: ../paper/apa.csl
link-citations: true
link-bibliography: true

fig-cap-location: top
fig-align: center
citations-hover: true
crossrefs-hover: true
callout-appearance: simple
lightbox: auto

execute:
  freeze: auto
  echo: false
  warning: false

format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    toc: true
    toc-depth: 2
    toc-location: right
    number-sections: true
    number-depth: 3
    code-copy: true
    code-overflow: wrap
    code-fold: true
    code-summary: "Mostrar código"
    code-tools:
      source: false
      toggle: true
      caption: "Código"
    code-link: true
    smooth-scroll: true
    df-print: paged
    link-external-icon: true
    link-external-newwindow: true
    include-after-body: includes/apa-figures.html
    grid:
      sidebar-width: 280px
      body-width: 920px
      margin-width: 260px
    fig-responsive: true
    html-math-method: mathjax
    anchor-sections: true
    citations-style: apa

  pdf:
    documentclass: scrbook
    classoption: [oneside, openany]
    include-in-header: latex/preamble.tex
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    pdf-engine: lualatex
    fig-pos: "H"
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=2.5cm
      - right=2.5cm
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
    citecolor: NavyBlue
