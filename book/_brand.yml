# Quarto 1.6+ brand configuration — single source of truth for palette and typography.
# Picked up automatically by `_quarto.yml`. Overrides values from `styles.scss`
# while remaining backwards-compatible (styles.scss continues to drive components).

meta:
  name: CRPTO
  subtitle: Conformal Robust Predict-Then-Optimize

color:
  palette:
    crpto-primary:      "#1f6feb"
    crpto-primary-soft: "#f6f8fb"
    crpto-accent:       "#5fa8ff"
    crpto-surface:      "#f8fafc"
    crpto-ink:          "#152238"
    crpto-muted:        "#526173"
    crpto-band-train:   "#e7f0ff"
    crpto-band-cal:     "#eef7e9"
    crpto-band-test:    "#fff2e3"
  foreground: crpto-ink
  background: "#ffffff"
  primary:    crpto-primary
  secondary:  crpto-accent
  success:    "#059669"
  warning:    "#d97706"
  danger:     "#dc2626"
  info:       "#0891b2"
  link:       crpto-primary
  light:      crpto-surface
  dark:       crpto-ink

typography:
  fonts:
    - family: Inter
      source: google
      weight: [300, 400, 500, 600, 700]
      style: [normal]
    - family: Source Serif 4
      source: google
      weight: [400, 600, 700]
      style: [normal, italic]
    - family: JetBrains Mono
      source: google
      weight: [400, 500]
      style: [normal]
  base:
    family: Inter
    weight: 400
    line-height: 1.55
  headings:
    family: Inter
    weight: 600
    line-height: 1.25
  monospace-inline:
    family: JetBrains Mono
  monospace-block:
    family: JetBrains Mono
  link:
    color: crpto-primary
    decoration: underline

logo:
  small:  assets/logo-small.svg
  medium: assets/logo.svg
  large:  assets/logo.svg

defaults:
  bootstrap:
    defaults:
      border-radius:  6px
      enable-shadows: true
