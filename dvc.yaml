stages:
  crpto.data.dataset:
    cmd: python src/data/make_dataset.py --input data/raw/Loan_status_2007-2020Q3.csv --output data/processed/loan_master.parquet
    deps:
      - data/raw/Loan_status_2007-2020Q3.csv
      - src/data/make_dataset.py
    outs:
      - data/processed/loan_master.parquet
  crpto.data.features:
    cmd: python scripts/materialize_feature_artifacts.py --config configs/crpto_pd_model.yaml
    deps:
      - data/processed/train.parquet
      - data/processed/test.parquet
      - scripts/materialize_feature_artifacts.py
      - configs/crpto_pd_model.yaml
    outs:
      - data/processed/train_fe.parquet
      - data/processed/test_fe.parquet
      - data/processed/calibration_fe.parquet
      - data/processed/feature_config.pkl
      - data/processed/feature_config.yml
      - data/processed/feature_manifest_v2.json
      - data/processed/feature_manifest_v2.parquet
      - data/processed/woe_encoders.pkl
  crpto.pd.champion:
    cmd: python scripts/train_pd_model.py --config configs/crpto_pd_model.yaml --run-tag paper-thesis-final-economic-2026-04-06
    deps:
      - data/processed/train_fe.parquet
      - data/processed/calibration_fe.parquet
      - scripts/train_pd_model.py
      - configs/crpto_pd_model.yaml
    params:
      - params.yaml:
          - paper.run_tag
          - champion.return_robust
          - pd.model
          - pd.catboost
          - pd.calibration
    outs:
      - models/pd_canonical.cbm
      - models/pd_canonical_calibrator.pkl
  crpto.conformal.intervals:
    cmd: python scripts/generate_conformal_intervals.py --config configs/crpto_conformal_policy.yaml --run-tag paper-thesis-final-economic-2026-04-06
    deps:
      - data/processed/test_predictions.parquet
      - scripts/generate_conformal_intervals.py
      - configs/crpto_conformal_policy.yaml
    params:
      - params.yaml:
          - conformal.alpha
          - conformal.coverage_targets
          - conformal.mondrian
          - conformal.variant_selection
    outs:
      - data/processed/conformal_intervals_mondrian.parquet
  crpto.conformal.validation:
    cmd: python scripts/validate_conformal_policy.py --config configs/crpto_conformal_policy.yaml --run-tag paper-thesis-final-economic-2026-04-06
    deps:
      - data/processed/conformal_intervals_mondrian.parquet
      - scripts/validate_conformal_policy.py
    params:
      - params.yaml:
          - conformal.coverage_targets
          - champion.v_alpha_001
          - champion.gamma_cp_alpha_001
          - champion.alpha_exact_pass
    outs:
      - models/conformal_policy_status.json
  crpto.portfolio.optimization:
    cmd: python scripts/optimize_portfolio.py --config configs/crpto_optimization.yaml
    deps:
      - data/processed/test_predictions.parquet
      - data/processed/conformal_intervals_mondrian.parquet
      - scripts/optimize_portfolio.py
    params:
      - params.yaml:
          - portfolio.policy_mode
          - portfolio.uncertainty_aversion
          - portfolio.max_concentration
          - portfolio.max_portfolio_pd
          - portfolio.min_budget_utilization
    outs:
      - data/processed/portfolio_allocations.parquet
  crpto.portfolio.bound_exact_eval:
    cmd: python scripts/search/run_portfolio_bound_exact_eval.py --context-path models/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_exact_context.json
    deps:
      - data/processed/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_shortlist.parquet
      - models/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_exact_context.json
      - scripts/search/run_portfolio_bound_exact_eval.py
    outs:
      - data/processed/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_bound_eval.parquet
  crpto.paper.export_tables:
    cmd: python scripts/export_crpto_tables.py --skip-evidence
    deps:
      - models/final_project_promotion.json
      - data/processed/pipeline_summary.json
      - scripts/export_crpto_tables.py
    outs:
      - reports/crpto/tables/crpto_table0_key_metrics.csv
  crpto.paper.evidence:
    cmd: python scripts/analyze_crpto_evidence.py
    deps:
      - scripts/analyze_crpto_evidence.py
      - models/final_project_promotion.json
    outs:
      - models/crpto_evidence_status.json
  crpto.paper.journal_package:
    cmd: python scripts/build_crpto_journal_package.py
    deps:
      - scripts/build_crpto_journal_package.py
      - reports/crpto/tables/crpto_tableA7_funded_set_loans.csv
      - reports/crpto/tables/crpto_tableA8_funded_set_composition.csv
      - reports/crpto/figures/crpto_fig1_journal_pipeline.png
      - reports/crpto/figures/crpto_fig1_journal_pipeline.pdf
      - reports/crpto/figures/crpto_fig1_journal_pipeline.svg
      - models/final_project_promotion.json
      - models/spo_real_training_status.json
      - data/processed/crpto_vs_spo_stability.json
      - data/processed/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_shortlist.parquet
      - data/processed/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_bound_eval.parquet
    outs:
      - models/crpto_journal_package_status.json
  crpto.paper.tail_satisficing_audit:
    cmd: python scripts/build_tail_satisficing_challenger_audit.py
    deps:
      - scripts/build_tail_satisficing_challenger_audit.py
      - src/optimization/tail_satisficing_objective.py
      - scripts/optimize_portfolio_tradeoff.py
      - configs/crpto_optimization.yaml
      - configs/crpto_tail_satisficing_objective.yaml
      - models/final_project_promotion.json
      - reports/crpto/tables/crpto_tableA7_funded_set_loans.csv
      - data/processed/test.parquet
      - data/processed/test_fe.parquet
      - data/processed/conformal_gap/conformal-reopen-2026-04-03-2149__resume__2026-04-05-1612__phase1__final__rank-1/conformal_intervals_mondrian.parquet
      - data/processed/portfolio_bound_aware/rank1_alpha01_bound_aware_276k_full_2026-04-05-1734/portfolio_bound_aware_shortlist.parquet
    outs:
      - models/crpto_tail_satisficing_audit_status.json
  crpto.paper.figures:
    cmd: python scripts/generate_crpto_figures.py --paper crpto
    deps:
      - scripts/generate_crpto_figures.py
    outs:
      - reports/crpto/figures/crpto_fig7_uncertainty_baselines.png
  crpto.paper.spo_stability:
    cmd: python scripts/run_crpto_vs_spo_stability.py
    deps:
      - scripts/run_crpto_vs_spo_stability.py
    outs:
      - data/processed/crpto_vs_spo_stability.json
  crpto.book.render:
    cmd: uv run python scripts/write_book_build_info.py && uv run -- quarto render book --to html
    deps:
      - book/_quarto.yml
      - book/index.qmd
      - book/chapters
      - book/styles.scss
      - scripts/write_book_build_info.py
    params:
      - params.yaml:
          - book.freeze
          - book.formats
    outs:
      - book/_book:
          cache: false
          persist: true
