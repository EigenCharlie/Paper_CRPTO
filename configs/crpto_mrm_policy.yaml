model:
  name: CorePDCanonical
  version: "1.0"
  owner: Carlos Vergara
  champion_artifact: models/pd_canonical.cbm

governance:
  validation_frequency_days: 90
  review_cadence: quarterly

governance_checks:
  ks_pvalue_min: 0.01
  cvm_pvalue_min: 0.01
  c2st_auc_max: 0.60
  max_feature_breach_ratio: 0.15
  c2st_max_rows_per_split: 50000
  performance_max_rows_per_split: 100000
  psi_bins: 10
  random_state: 42
  score_psi_max: 0.15
  auc_delta_max: 0.05
  brier_increase_max: 0.02
  calibration_gap_delta_max: 0.02
  explanation_rank_overlap_top10_min: 0.60
  explanation_shap_psi_max: 0.25
  reason_code_stability_min: 0.55
  explanation_min_rows_per_slice: 80

retraining_triggers:
  psi_threshold: 0.25
  auc_degradation_threshold: 0.03
  coverage_degradation_threshold: 0.02

challenger:
  criteria:
    - metric: auc_roc
      improvement_min: 0.005
    - metric: ece
      improvement_min: 0.002
  promotion_requires:
    - conformal_policy_pass: true
    - fairness_audit_pass: true
    - governance_checks_pass: true
  modeling_constraints:
    no_smote: true
    monotonic_constraints_required: true

approval_workflow:
  steps:
    - name: developer_self_validation
      owner: developer
    - name: independent_validation
      owner: model_risk_team
    - name: sign_off
      owner: model_owner

artifacts:
  pipeline_summary: data/processed/pipeline_summary.json
  conformal_status: models/conformal_policy_status.json
  governance_status: models/governance_status.json
  fairness_status: models/fairness_audit_status.json
  pd_backtesting_status: models/pd_backtesting_status.json
  bootstrap_validation_status: models/bootstrap_validation_status.json
  monotonicity_status: models/monotonicity_audit_status.json
  encoding_stability_status: models/encoding_stability_status.json
  pd_validation_interpretation_status: models/pd_validation_interpretation_status.json
  calibration_mapping_status: models/calibration_mapping_status.json
  model_shift_status: models/model_shift_status.json

governance_output:
  drift_monitoring_path: data/processed/drift_monitoring.parquet
  explanation_drift_path: data/processed/explanation_drift.parquet
  fairness_status_path: models/fairness_audit_status.json
  fairness_frontier_path: data/processed/fairness_threshold_frontier.parquet
  challenger_promotion_report_path: models/challenger_promotion_report.json
  governance_status_path: models/governance_status.json
  model_shift_status_path: models/model_shift_status.json

output:
  mrm_report_json: reports/mrm/mrm_validation_report.json
