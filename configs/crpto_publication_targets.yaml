  mechanism: >-
    Candidate coverage fails under all eight windows and both learners. A score
    stratum crosses the binary residual prevalence threshold, changing its
    interval geometry discontinuously. Endpoint directions change across
    objective-matched and normalized-score rulers and interior coordinates.
    Same-cap and C2 comparisons have exact plug-in statements, while realized
    directions also depend on exact comparator support.
