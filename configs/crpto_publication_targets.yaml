claim_boundaries:
  required:
    - "Observed binary-endpoint residual interval, not a latent-PD confidence interval."
    - "Five coverage controls, one portfolio learner, and no OOT model winner."
    - "Overlapping windows and repeated allocations are not independent replications."
    - "Sharp bounds are partial identification, not confidence intervals."
    - "Retrospective contrasts are not causal, prospective, or confirmatory."
    - "The archive is not a verified point-in-time snapshot."
    - "The status-indexed payoff proxy is not cash-flow return, NPV, IRR, or welfare."
  forbidden:
    - "Selected model, gamma, ruler, coordinate, cap, comparator, or policy."
    - "Universal portfolio direction or selected-set conformal guarantee."
    - "Markov, deployment, causal, or fair-lending certificate."

secondary_targets:
  - id: ejor
    role: secondary
    name: "European Journal of Operational Research"
    publisher: Elsevier
  - id: decision_support_systems
    role: applied_fallback
    name: "Decision Support Systems"
    publisher: Elsevier

current_decision:
  write_first_for: informs_ijds
  keep_second_ready_for: ejor
  target_submission_date: not_fixed
  freeze_rule: >-
    Continue pre-freeze scientific, editorial, and reproducibility work. Do not
    select on 2016--2017 outcomes. Submission freeze requires a separate
    explicit decision.
