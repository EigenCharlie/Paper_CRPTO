active_scientific_contract:
  claim_registry: docs/research/active_claims_2026-07-11.md
  outcome_free_run_tag: ijds-fixed-taxonomy-c2-2026-07-11-v1
  outcome_free_protocol_tag: protocol/ijds-fixed-taxonomy-c2-2026-07-11-v1
  outcome_free_protocol_commit: 4835cc18a0117a695f89f9da70a4e3af97663a27
  outcome_free_freeze_sha256: 93690082880ef4ff1375dcd5b26d2df79f80e6ebe09a6d83b7fd99a9abb4cfae
  run_tag: ijds-fixed-taxonomy-c2-2026-07-11-v2
  protocol_tag: protocol/ijds-fixed-taxonomy-c2-2026-07-11-v2
  protocol_commit: a88839dfe14875fca2c02c43725291bc49d98611
  evidence_manifest: reports/crpto/ijds_fixed_taxonomy_c2_evidence.json
  previously_inspected_retrospective_archive: true
  method:
    conformal: >-
      Five score strata fixed from 2011 calibrated scores, followed by exact
      binary-outcome residual ranks on availability-safe 2012H1 labels.
    policies: >-
      All nine tau-gamma guardrails are co-primary; there is no selector or
      OOT winner.
    comparator: >-
      C2 matches each monthly guardrail's frozen funded point-PD moment on the
      identical outcome-free menu; C0, C1, and a 29-cap frontier form the
      declared multiverse.
    payoff: "Expected (1-p)r-p*LGD and realized (1-Y)r-Y*LGD."
    evaluation: "Fifteen separate monthly decisions from 2016-04 through 2017-06."
    unresolved: "Retained with sharp binary aggregate and common-outcome pairwise bounds."
  headline:
    conformal_fit_coverage: 0.900388
    candidate_coverage: [0.854714, 0.879647]
    c2:
      payoff_worse: 7
      default_higher: 1
      miscoverage_higher: 8
      policy_pairs: 9
    seed_purpose_cells: 180
    multiverse_indeterminate_envelopes: 27
    multiverse_total_envelopes: 27
    universal_policy_direction_allowed: false
  mechanism: >-
    Fixed-taxonomy coverage fails under temporal transport. Same-cap C0 makes
    the guardrail appear uniformly safer, while exact funded-PD matching and
    the point-cap frontier remove every universal direction. Binding purpose
    constraints interact materially with the score and comparator.
  required_artifacts:
    - reports/crpto/ijds_fixed_taxonomy_c2_evidence.json
    - reports/crpto/tables/crpto_ijds_ft_table1_policy_grid.csv
    - reports/crpto/tables/crpto_ijds_ft_table2_coverage.csv
    - reports/crpto/tables/crpto_ijds_ft_table3_comparator_contrasts.csv
    - reports/crpto/tables/crpto_ijds_ft_table4_direction_summary.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS1_seed_cap_sensitivity.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS2_point_cap_frontier.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS3_lgd.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS4_group_ablation.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS5_policy_levels.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS6_simulation.csv
    - reports/crpto/tables/crpto_ijds_ft_tableS7_label_availability.csv
    - reports/crpto/figures/crpto_ijds_ft_fig1_coverage.pdf
    - reports/crpto/figures/crpto_ijds_ft_fig2_comparators.pdf
    - reports/crpto/figures/crpto_ijds_ft_fig3_frontier.pdf
    - reports/crpto/figures/crpto_ijds_ft_fig4_simulation.pdf
