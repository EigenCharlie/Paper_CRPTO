claim_boundaries:
  required:
    - "Binary-outcome interval, not a latent-PD confidence interval."
    - "Marginal/Mondrian coverage is not selected-set validity."
    - "Standardized payoff is not cash-flow return or IRR."
    - "Sharp bounds are partial identification, not confidence intervals."
    - "Retrospective contrasts are not causal effects."
    - "Code-locked retrospective audit, not preregistration or a prospective trial."
    - "C2 is an outcome-free adaptive audit comparator, not a deployable fixed rule."
    - "The archive was previously inspected; the protocol is not confirmatory."
  forbidden:
    - "Universal economic dominance."
    - "A unique or theoretically optimal comparator-matching rule."
    - "A 9-of-9 family direction."
    - "A selected policy or OOT winner."
    - "A comparator-robust sign over the declared multiverse."
    - "Selected-set conformal guarantee."
    - "Markov certificate or deterministic tail guarantee."
    - "Fair-lending certification."
    - "Live post-2020 performance."

historical_boundary:
  compact_v7_status: git_history_only
  p1_c1_status: git_history_only
  diagnostics_status: git_history_only
  diagnostics:
