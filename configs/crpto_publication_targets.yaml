  protocol_commit: ca632ccfbbfaec0e6cdf482a279468665cdb62c0
  evidence_manifest: reports/crpto/ijds_comparator_stringency_evidence.json
  posthoc_diagnostic_after_parent_results: true
  method:
    conformal: >-
      90%-target split-Mondrian interval using the exact finite-sample rank for
      the binary snapshot outcome.
    policy: "q=0.75p+0.25u with tau=0.17."
    comparator: >-
      Point PD with tau=0.06831339893217318, matched to the selected
      guardrail's mean development-funded point PD.
    payoff: "Expected (1-p)r-p*LGD and realized (1-Y)r-Y*LGD."
    evaluation: "Fifteen separate monthly decisions from 2016-04 through 2017-06."
    unresolved: "Retained with sharp binary aggregate and pairwise bounds."
  headline:
    candidate_coverage: [0.854923, 0.879692]
    same_threshold:
      payoff_difference: [-322703.79, -58040.34]
      default_difference: [-0.046275, -0.020093]
      miscoverage_difference: [0.008822, 0.029850]
    development_matched:
      expected_payoff_difference: 8479.18
      payoff_difference: [-506587.03, -295967.17]
      default_difference: [0.034431, 0.056287]
      miscoverage_difference: [0.027093, 0.046283]
    family_all_three_guardrail_worse: 7
    family_pairs: 9
  mechanism: >-
    The same-threshold comparison confounds score transformation with risk-cap
    stringency. Once development point risk is aligned, the point policy has
    lower realized default and miscoverage; adaptive within-stratum selection
    remains the main coverage-transport failure for both policies.
