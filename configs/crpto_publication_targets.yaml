    - reports/crpto/figures/crpto_ijds_v4_fig1_coverage.pdf
    - reports/crpto/figures/crpto_ijds_v4_fig1_coverage.png
    - reports/crpto/figures/crpto_ijds_v4_fig2_phase_transition.pdf
