    - "A25--A34: Prosper and Freddie/Mendeley static transfer studies."
    - "A35--A40: compact-v7 exact-alpha, selector, and portfolio bundle."
  rule: >-
    Historical artifacts remain recoverable from Git/DVC but are excluded from
    the active capsule and cannot validate, fill, or redefine the fixed-taxonomy audit.

