  method:
    conformal: >-
      Five score strata fixed from 2011 Platt-scaled scores, followed by exact
      binary-outcome residual ranks in every eligible consecutive six-month
      window from January 2012 through January 2013.
    learners: >-
      CatBoost/Platt is primary; independently calibrated numeric logistic
      regression is a coverage-only control and never enters optimization.
    decision_diagnostic: >-
      The complete gamma path {0,.25,.50,.75,1} is evaluated under an
      objective-matched primary ruler and normalized-score secondary ruler at
      coordinates {.25,.50,.75}; gamma=1-gamma=0 is the frozen contrast and
      there is no selector or OOT winner.
    comparator: >-
      The nine fixed-cap policies, C0, C1, C2, exact development-admissible
      support, and broad [0.05,0.12] stress support are supporting outcome-free
      diagnostics. HiGHS basis endpoints give exact sharp envelopes over each
      declared point-cap interval.
    payoff: "Model-implied plug-in (1-p)r-p*LGD and realized (1-Y)r-Y*LGD."
    evaluation: "Fifteen separate monthly decisions from 2016-04 through 2017-06."
    unresolved: "Retained with sharp binary aggregate and common-outcome pairwise bounds."
