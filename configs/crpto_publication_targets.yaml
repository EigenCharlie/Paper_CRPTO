claim_boundaries:
  required:
    - "Clipped binary-outcome residual interval, not a latent-PD confidence limit or discrete-set convex hull."
    - "Platt-scaled score and plug-in objective, not asserted true conditional probability."
    - "All eight overlapping residual windows are complete specifications, not independent replications."
    - "Six ruler-coordinate tracks observed through eight windows are not 48 independent replications."
    - "Objective matching equalizes only model-implied opportunity cost; normalized-score matching is affine-invariant but does not equalize opportunity cost."
    - "The three interior coordinates form a finite diagnostic; coordinate one is a structural null and no continuous joint-frontier claim is active."
    - "The logistic learner is a coverage-only control and does not enter portfolio optimization."
    - "Marginal/Mondrian coverage is not selected-set validity."
    - "Standardized payoff is not cash-flow return or IRR."
    - "Sharp bounds are partial identification, not confidence intervals."
    - "Retrospective contrasts are not causal effects."
    - "Code-locked retrospective audit, not preregistration or a prospective trial."
    - "C2 is an outcome-free adaptive audit comparator, not a deployable fixed rule."
    - "Exact comparator envelopes quantify only the declared outcome-free cap supports."
    - "The archive was previously inspected; the protocol is not confirmatory."
    - "The factorial simulation supports a coverage mechanism only, not a portfolio claim."
  forbidden:
    - "Universal economic dominance."
    - "A unique or theoretically optimal comparator-matching rule."
    - "A 9-of-9 family direction or eight-confirmation claim for one repeated allocation contrast."
    - "A selected gamma, ruler, coordinate, policy, or OOT winner."
    - "A selected residual window, learner, taxonomy, cap, or comparator."
    - "A comparator-robust sign over the declared multiverse."
    - "Selected-set conformal guarantee."
    - "Markov certificate or deterministic tail guarantee."
    - "Fair-lending certification."
    - "Live post-2020 performance."

