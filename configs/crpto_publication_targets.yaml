version: "2026-07-15"
project: paper-crpto
decision_status: prefreeze_active

primary_target:
  id: informs_ijds
  role: primary
  name: "INFORMS Journal on Data Science"
  publisher: INFORMS
  manuscript_source: paper/CRPTO_ijds.qmd
  supplement_source: paper/supplement_ijds.qmd
  official_tex_source: paper/submission/CRPTO_ijds_submission.tex
  template_family: "INFORMS IJDS LaTeX"
  official_urls:
    submission_guidelines: "https://pubsonline.informs.org/page/ijds/submission-guidelines"
    data_code_policy: "https://pubsonline.informs.org/page/ijds/data-and-code-disclosure-policy"
    reviewer_guidelines: "https://pubsonline.informs.org/page/ijds/reviewer-guidelines"
    latex_style_files: "https://pubsonline.informs.org/authorportal/latex-style-files"
  constraints:
    initial_submission_pages: 25
    page_limit_excludes: [references, appendices]
    online_supplement: separate_file
    review_model: double_anonymous
    submission_file: pdf_from_ijds_latex_template
    data_code_disclosure: required

active_scientific_contract:
  claim_registry: docs/research/active_claims_2026-07-14.md
  claim_ledger: configs/ijds_claim_ledger.yaml
  source_registry: configs/ijds_active_evidence_sources.yaml
  evidence_manifest: reports/crpto/ijds_binary_geometry_frontier_v4_evidence.json
  lineage_and_dvc_authority: configs/ijds_active_evidence_sources.yaml

  active_code_surface:
    source_roots:
      - src
    paper_pipeline:
      - scripts/build_ijds_binary_geometry_frontier_v4_evidence.py
      - scripts/check_publication_integrity.py
      - scripts/build_ijds_submission_tex.py
      - scripts/compile_ijds_submission.py
      - scripts/render_submission_pdf_previews.py
    protocol_entrypoints:
      - scripts/experiments/run_ijds_binary_geometry_frontier_v4.py
      - scripts/experiments/run_ijds_normalized_objective_frontier.py
      - scripts/experiments/run_ijds_normalized_objective_frontier_v2.py
      - scripts/experiments/run_ijds_raw_data_audit.py
      - scripts/experiments/run_ijds_credit_risk_controls.py
      - scripts/experiments/run_ijds_label_lag_sensitivity.py
      - scripts/experiments/run_ijds_endpoint_availability_sensitivity.py
      - scripts/experiments/run_ijds_missingness_sensitivity.py
      - scripts/experiments/run_ijds_portfolio_structure_sensitivity.py
      - scripts/experiments/run_ijds_policy_support_tie_audit.py
    support_tools:
      - scripts/build_ijds_policy_support_tie_evidence.py
      - scripts/manage_ijds_dvc_capsule.py
      - scripts/run_complexity_report.py
      - scripts/run_ty_advisory.py
    historical_execution_in_active_capsule: false

  sealed_compatibility_capsule:
    purpose: >-
      Preserve path-bound hashes and the historical DVC graph without exposing
      either as current evidence, an executable workflow, or manuscript history.
    authorities:
      - EXTRACTION_MANIFEST.json
      - dvc.yaml
      - dvc.lock
    execution_allowed: false
    paper_evidence_allowed: false

  previously_inspected_retrospective_archive: true
  archive_is_verified_point_in_time_snapshot: false
  endpoint_cutoff: "2020-09-30"
  confirmatory: false
  prospective: false
  causal: false
  policy_winner_allowed: false

  method:
    prediction: >-
      CatBoost/Platt is the only portfolio score. Numeric logistic, monotonic
      CatBoost, platform-signal WOE/IV, and pricing-excluded application WOE/IV
      are coverage-only controls and cannot be selected from OOT outcomes.
    conformal: >-
      Five score strata are fixed from 2011 scores. Exact binary-outcome
      residual ranks are reported for all eight eligible six-month windows.
    decision: >-
      Gamma {0,.25,.50,.75,1} is evaluated under objective-matched and
      normalized-score rulers at {.25,.50,.75}; gamma 1 minus gamma 0 is the
      frozen endpoint contrast, with no selector.
    comparator: >-
      C0, C1, C2, exact development-admissible support, and broad [0.05,0.12]
      support are outcome-free diagnostics. HiGHS basis endpoints give exact
      sharp envelopes on each declared point-cap interval.
    endpoint: >-
      Terminal status is conservatively reconstructed as observable by the
      cutoff; later terminal statuses and nonterminal rows remain unresolved.
    payoff: >-
      Plug-in (1-p)r-p*LGD and status-indexed standardized proxy
      (1-Y)r-Y*LGD; neither is a cash-flow return, IRR, NPV, or welfare measure.

  required_artifacts:
    - reports/crpto/ijds_binary_geometry_frontier_v4_evidence.json
    - reports/crpto/ijds_policy_support_tie_evidence.json
    - reports/crpto/tables/crpto_ijds_comparator_support_domain.csv
    - reports/crpto/tables/crpto_ijds_gamma_endpoint_audit.csv
    - reports/crpto/tables/crpto_ijds_policy_family_domain.csv
    - reports/crpto/tables/crpto_ijds_v4_table1_coverage_windows.csv
    - reports/crpto/tables/crpto_ijds_v4_table2_phase_transition.csv
    - reports/crpto/tables/crpto_ijds_v4_table3_development_envelopes.csv
    - reports/crpto/tables/crpto_ijds_v4_table4_direction_summary.csv
    - reports/crpto/tables/crpto_ijds_v4_table5_two_ruler_tracks.csv
    - reports/crpto/tables/crpto_ijds_v4_table6_credit_controls.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS1_named_comparators.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS2_credit_prediction_metrics.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS3_woe_iv_psi.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS4_score_psi.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS5_label_lag_sensitivity.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS6_endpoint_availability_sensitivity.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS7_portfolio_structure_sensitivity.csv
    - reports/crpto/tables/crpto_ijds_v4_tableS8_endpoint_resolution.csv
