  method:
    conformal: >-
      Five score strata fixed from 2011 Platt-scaled scores, followed by exact
      binary-outcome residual ranks in locked early 2012H1 and late
      2012H2--2013M1 windows.
    policies: >-
      All nine tau-gamma guardrails are co-primary; there is no selector or
      OOT winner.
    comparator: >-
      C2 matches each monthly guardrail's frozen funded point-score moment on
      the identical outcome-free menu; core, development-supported, and broad
      comparator scopes are reported.
    payoff: "Model-implied plug-in (1-p)r-p*LGD and realized (1-Y)r-Y*LGD."
    evaluation: "Fifteen separate monthly decisions from 2016-04 through 2017-06."
    unresolved: "Retained with sharp binary aggregate and common-outcome pairwise bounds."
  headline:
    early_conformal_fit_coverage: 0.900388
    late_conformal_fit_coverage: 0.900174
    early_candidate_coverage: [0.854714, 0.879647]
    late_candidate_coverage: [0.845072, 0.870973]
    early_c2:
      payoff_worse: 7
      default_higher: 1
      miscoverage_higher: 8
      policy_pairs: 9
    late_c2:
      payoff_worse: 5
      default_higher: 1
      miscoverage_higher: 8
      policy_pairs: 9
    seed_purpose_cells_per_window: 180
    seed_purpose_cells_total: 360
    binding_guardrail_month_cells: 2025
    indeterminate_envelopes_per_scope: 27
    total_scope_envelopes: 81
    comparator_scopes: 3
    common_oot_point_rows: 465117
    maximum_point_score_difference: 0.0
    canonical_point_policy_cells: 570
    maximum_point_exposure_difference: 0.0
    terminal_endpoint_inventory:
      resolved: 499845
      unresolved: 40276
    frozen_status_diagnostic:
      resolved: 500019
      unresolved: 40102
    universal_policy_direction_allowed: false
  mechanism: >-
    Candidate coverage fails under both residual windows, all fixed taxonomies,
    and the late label-lag grid. Same-cap C0 makes the guardrail appear uniformly
    safer, while exact funded-score matching and every declared comparator scope
    remove universal direction. Binding purpose constraints interact materially
    with the score and comparator.
