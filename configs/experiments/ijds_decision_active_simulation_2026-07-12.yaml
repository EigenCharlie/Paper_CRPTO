extends: "ijds_binary_geometry_frontier_v4_2026-07-12.yaml"

schema_version: "2026-07-12.6"
protocol_tag: "protocol/ijds-decision-active-simulation-2026-07-12-v1"
run_tag: "ijds-decision-active-simulation-2026-07-12-v1"

protocol_lineage_files:
  - "configs/experiments/ijds_binary_geometry_frontier_v4_2026-07-12.yaml"
  - "docs/research/ijds_binary_geometry_frontier_v4_protocol_2026-07-12.md"
  - "docs/research/ijds_decision_active_simulation_protocol_2026-07-12.md"

hypothesis: >-
  Binary conformal geometry and comparator choice can change optimized
  allocations only when the score constraint is decision-active. A normalized,
  outcome-free cap between the minimum-score and unconstrained-objective
  portfolios provides a predeclared mechanism for separating coverage
  transport, optimizer selection, and C0-versus-C2 comparator semantics.

decision_active_simulation:
  enabled: true
  role: "mechanism_only_no_empirical_sign_validation"
  random_seed: 20260712
  factor_pairing: "common_random_numbers_by_repetition"
  repetitions: 50
  fit_sample_size: 2500
  candidate_sample_size: 1200
  funded_units: 120
  beta_shape: [2.0, 18.0]
  score_shift_grid: [0.0, 0.08]
  calibration_log_odds_shift_grid: [0.0, 0.75, 1.50]
  taxonomy_groups_grid: [1, 5]
  normalized_cap_position_grid: [0.25, 0.50, 0.75]
  censoring_rate_grid: [0.0, 0.15]
  gamma: 0.50
  lgd: 0.45
  rate:
    intercept: 0.04
    score_slope: 1.20
    noise_sd: 0.015
    lower: 0.03
    upper: 0.40
  purpose_cap: 1.0
  minimum_effective_score_range: 1.0e-4
  binding_tolerance: 1.0e-7
  c2_match_tolerance: 1.0e-10
  objective_dominance_tolerance: 1.0e-5
  allocation_distance_tolerance: 1.0e-12
  threads: 1

resume_outcome_free: null

output:
  data_root: "data/processed/experiments/ijds_audit"
  model_root: "models/experiments/ijds_audit"
  immutability: "hard_no_overwrite_choose_fresh_run_tag"
  repetitions: "decision_active_repetitions.parquet"
  cell_summary: "decision_active_cell_summary.parquet"
  direction_counts: "decision_active_direction_counts.parquet"
  deterministic_result: "decision_active_simulation_summary.json"
  execution_receipt: "execution_receipt.json"
