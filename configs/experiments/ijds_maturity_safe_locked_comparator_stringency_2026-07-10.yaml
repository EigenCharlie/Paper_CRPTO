schema_version: "2026-07-10.1"
protocol_status: "locked_posthoc_comparator_audit_before_execution"
protocol_tag: "protocol/ijds-maturity-safe-v2-comparator-stringency-audit-2026-07-10-v1"
run_tag: "champion-reopen-2026-07-10__maturity-safe-v2-comparator-stringency-audit-v1"
posthoc_diagnostic_after_active_results: true

hypothesis: >-
  Equal numeric risk thresholds do not create comparable feasible sets when a
  conformal guardrail score q is everywhere at least point PD p. A point-PD
  policy matched to the selected guardrail's development-funded mean p can
  therefore reverse the apparent OOT default advantage of the same-threshold
  comparison under temporal shift.

parent:
  run_tag: "champion-reopen-2026-07-10__maturity-safe-locked-bounded-h1h2-v2"
  protocol_tag: "protocol/ijds-maturity-safe-locked-bounded-h1h2-2026-07-10-v2"
  config: "configs/experiments/ijds_maturity_safe_locked_bounded_h1h2_2026-07-10.yaml"
  evidence_manifest: "reports/crpto/ijds_maturity_safe_evidence.json"
  data_dir: >-
    data/processed/experiments/champion_reopen/champion-reopen-2026-07-10__maturity-safe-locked-bounded-h1h2-v2
  model_dir: >-
    models/experiments/champion_reopen/champion-reopen-2026-07-10__maturity-safe-locked-bounded-h1h2-v2

primary_policy:
  candidate_id: "linear-004"
  risk_tolerance: 0.17
  gamma: 0.25
  label: "selected_conformal_guardrail"
  promotion_locked: true

comparators:
  same_threshold:
    label: "same_threshold_point_pd"
    risk_tolerance: 0.17
    role: "secondary_diagnostic"
  development_matched:
    label: "development_matched_point_pd"
    statistic: "capital_weighted_mean_funded_point_pd_over_2012H2_months"
    primary_risk_tolerance: 0.06831339893217318
    sensitivity_rule: "minimum_mean_maximum_monthly_funded_point_pd"
    sensitivity_risk_tolerances:
      low: 0.06503179389092847
      mid: 0.06831339893217318
      high: 0.07170531506384897
    role: "primary_posthoc_falsification_comparator"
  matching_tolerance: 1.0e-12

family_census:
  enabled: true
  guardrail_candidates: "all_nine_parent_development_candidates"
  point_match_rule: "each_guardrail_development_funded_mean_point_pd"
  oot_reselection_forbidden: true
  all_rows_must_be_reported: true
  family_claim_requires_same_direction: "9_of_9"
  family_result_cannot_promote_new_policy: true

analysis:
  blocks:
    - "policy_development"
    - "primary_oot"
    - "censored_extension"
  primary_months: 15
  extension_months: 3
  common_outcome_pairwise_bounds: true
  selector_leave_one_month_out: true
  primary_leave_one_month_out: true
  score_geometry: true
  payoff_decomposition: true
  fixed_allocation_lgd_break_even: true
  lgd_domain: [0.0, 1.0]
  purpose_concentration_sensitivity: false
  causal_interpretation: false
  confirmatory_interpretation: false
  no_new_policy_selection: true

decision_gate:
  required_primary_directions:
    same_threshold_default_upper_lt_zero: true
    development_matched_payoff_upper_lt_zero: true
    development_matched_default_lower_gt_zero: true
    development_matched_miscoverage_lower_gt_zero: true
  require_all_primary_leave_one_month_out: true
  report_all_low_mid_high_sensitivities: true
  stop_if_replay_disagrees: true
  forbidden_after_execution:
    - "change_alpha"
    - "change_gamma"
    - "change_guardrail_tau"
    - "change_matched_tau_rule"
    - "change_lgd"
    - "change_payoff"
    - "change_months"
    - "promote_another_guardrail"
    - "select_a_favorable_sensitivity"

execution:
  allocation_tolerance: 1.0e-10
  deterministic_tolerance: 1.0e-10

output:
  data_root: "data/processed/experiments/champion_reopen"
  model_root: "models/experiments/champion_reopen"
  immutability: "hard_no_overwrite_choose_fresh_run_tag"
  deterministic_result: "comparator_stringency_audit_summary.json"
  execution_receipt: "execution_receipt.json"
