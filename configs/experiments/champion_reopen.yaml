run_tag: champion-reopen-2026-06-19
seeds: [42, 52, 62, 72, 82]
sample_rows: 0

data:
  train_path: data/processed/train_fe.parquet
  calibration_path: data/processed/calibration_fe.parquet
  test_path: data/processed/test_fe.parquet
  feature_config_path: data/processed/feature_config.yml

validation:
  scheme: temporal_train_val_cal_test
  val_fraction: 0.15
  date_col: issue_d

tabprep:
  variants: [balanced_1500]
  persist_transformed: false
  suspicious_auc_threshold: 0.90
  extra_blacklist:
    - id
    - url
    - loan_status
    - emp_title
    - title
    - zip_code
    - addr_state
    - next_pymnt_d
    - pymnt_plan
    - application_type
    - verification_status_joint
    - settlement_status
    - hardship_status
    - debt_settlement_flag
  monotonic_constraints:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
    installment_burden: 1
    fico_score: -1
    credit_age_years: -1
    bc_util: 1
    percent_bc_gt_75: 1

model:
  type: catboost
  params:
    iterations: 4200
    learning_rate: 0.057321202729872456
    depth: 8
    l2_leaf_reg: 119.37272987133554
    min_data_in_leaf: 135
    rsm: 0.5716653769355704
    random_strength: 1.3208942645900998e-07
    border_count: 254
    bootstrap_type: MVS
    subsample: 0.678878683066026
    loss_function: Logloss
    auto_class_weights: Balanced
    eval_metric: AUC
    has_time: true
    allow_writing_files: false
    random_seed: 42
    early_stopping_rounds: 150
    grow_policy: SymmetricTree
    leaf_estimation_iterations: 5
    monotone_constraints: installment:1,annual_inc:-1,dti:1,loan_to_income:1,installment_burden:1,fico_score:-1,credit_age_years:-1,bc_util:1,percent_bc_gt_75:1
    feature_weights:
      loan_to_income: 1.3
      annual_inc: 1.2
      dti: 1.2
      installment_burden: 1.1
      fico_score: 1.2
    penalties_coefficient: 0.75

calibration:
  method: auto
  candidates:
    - platt
    - isotonic
    - beta
    - venn_abers
    - temperature
    - quadratic_logit

evaluation:
  fairness_threshold: 0.50
  fairness_columns:
    - grade
    - sub_grade
    - term
    - purpose
    - home_ownership

output:
  data_dir: data/processed/experiments/champion_reopen
  model_dir: models/experiments/champion_reopen
  report_dir: reports/crpto/experiments/champion_reopen

champion_reopen:
  selector_model: models/experiments/tabprep/tabprep-catboost-full-2026-06-17/balanced_1500/seed_42/pd_tabprep_challenger.cbm
  ranking_method: pvc
  shap_rows: 30000
  smoke_sample_rows: 50000
  smoke_cases:
    - core42
    - pool93
    - pool93_woe
    - pooltop42_tab20
    - pooltop55_business40
  feature_search_cases:
    - core42
    - catboost44
    - pool93
    - pool93_woe
    - pool93_top90
    - pool93_business80
    - pool93_business100
    - pooltop42_tab20
    - pooltop42_tab40
    - pooltop55_tab40
    - pooltop55_tab60
    - pooltop64_tab60
    - pooltop64_tab90
    - pooltop72_tab60
    - pooltop72_tab90
    - pooltop80_tab90
    - pooltop93_tab120
    - pooltop42_business20
    - pooltop55_business40
    - pooltop64_business60
    - pooltop72_business80
    - pooltop80_business80
    - pooltop93_business100
  seed_replay_cases:
    - pool93_woe
    - pooltop93_tab120
    - pooltop80_business80
    - pooltop80_tab90
    - pooltop72_business80
    - pool93_business80
    - pool93
    - pool93_top90
    - pooltop72_tab60
    - pooltop64_business60
    - pooltop55_business40
    - catboost44
  seed_replay_seeds: [52, 62, 72, 82]
  pd_promotion_gates:
    champion_auc: 0.7138518124963467
    champion_brier: 0.15439302183275685
    champion_ece: 0.006998009158194006
    min_auc_delta_mean: 0.005
    max_auc_seed_std: 0.0015
    max_brier_increase: 0.0005
    max_ece_increase: 0.0025
  portfolio_gates:
    champion_return: 170464.5429
    champion_v_alpha01: 0.028875
    champion_c_cp: 0.187987
    min_robust_region_passers: 45
    require_exact_alpha01_pass: true

downstream:
  enabled: false
  requires_explicit_promotion: true
  conformal_config_path: configs/experiments/tabprep_conformal_policy.yaml
  optimization_config_path: configs/experiments/tabprep_optimization.yaml
