run_tag: tabpfn-tabprep-full-2026-06-16

data:
  train_path: data/processed/train_fe.parquet
  calibration_path: data/processed/calibration_fe.parquet
  test_path: data/processed/test_fe.parquet
  feature_config_path: data/processed/feature_config.yml

tabprep:
  variant: full_3000
  max_tabpfn_features: 2000
  extra_blacklist:
    - id
    - url
    - loan_status
    - emp_title
    - title
    - zip_code
    - addr_state
    - next_pymnt_d
    - pymnt_plan
    - application_type
    - verification_status_joint

tabpfn:
  n_estimators: 8
  device: cuda
  use_native_categorical_features: false
  ignore_pretraining_limits: true
  inference_precision: auto
  fit_mode: low_memory
  memory_saving_mode: true
  keep_cache_on_device: false
  n_preprocessing_jobs: 1
  show_progress_bar: true
  prediction_chunk_rows: 1000
  inference_config:
    ENABLE_GPU_PREPROCESSING: false
    FEATURE_SUBSAMPLING_METHOD: gini_feature_importance
    FEATURE_SUBSAMPLING_IMPORTANCE_TOP_K_COUNT: 150

calibration:
  method: platt

output:
  data_dir: data/processed/experiments/tabpfn_tabprep
  model_dir: models/experiments/tabpfn_tabprep
  report_dir: reports/crpto/experiments/tabpfn_tabprep
  save_classifier_pickle: false
