schema_version: "2026-06-21.1"
profile_name: search_conformal_claim_max
description: >
  Claim-max conformal search for champion reopening. Optimizes coverage,
  interval width, temporal/group robustness, and downstream portfolio usefulness
  without writing canonical artifacts.
writes_canonical_artifacts: false
search_space:
  phase1:
    parallel_workers: 3
    alpha_candidates_90: [0.05, 0.075, 0.085, 0.09, 0.095, 0.10, 0.105, 0.11, 0.125, 0.15, 0.20]
    alpha_candidates_95: [0.025, 0.035, 0.04, 0.045, 0.05, 0.055, 0.06, 0.075]
    partition_candidates:
      - grade
      - score_decile_mondrian
      - grade_x_scoreband_mondrian
    partition_probability_sources: [calibrated, raw]
    n_score_bins_candidates: [5, 10, 15, 20, 30]
    min_group_sizes: [50, 100, 150, 250, 500, 1000, 2000]
    fallback_modes: [grade_then_global, global_only]
    score_scale_families:
      - none
      - bernoulli_sqrt
      - bernoulli_sqrt_clipped_0.02
      - bernoulli_sqrt_clipped_0.05
    calibration_fractions: [0.50, 0.75, 1.00]
    tuning_holdout_ratios: [0.20, 0.30]
    inner_random_states: [42, 52, 62]
  phase2:
    enabled: true
    always_evaluate: true
    top_k_designs: 5
    calibrators:
      - venn_abers
      - beta
      - isotonic
      - platt
      - temperature
      - quadratic_logit
    max_metric_degradation:
      ece: 0.0015
      brier_score: 0.0008
      log_loss: 0.0025
sidecar:
  methods: [lac, margin]
  partitions:
    - global
    - grade
    - score_decile_mondrian
    - grade_x_scoreband_mondrian
  partition_probability_sources: [calibrated]
  n_score_bins: 10
  min_group_size: 100
  fallback_mode: grade_then_global
  calibration_size_fractions: [0.50, 0.75, 1.00]
validation:
  top_k_inner: 5
  acceptance:
    warning_alerts_max: 4
    total_alerts_max: 5
    coverage_deviation_90_max: 0.025
    min_group_coverage_90_min: 0.88
    avg_width_90_max: 0.80
claim_targets:
  same_region_higher_return: downstream portfolio may prefer this if width/bound stays stable
  same_region_better_bound: prioritize lower width, Winkler, Gamma_CP, and V
  wider_zero_violation_region: preserve group/temporal coverage while broadening feasible policies
  clean_paper_region: prefer grade/score/grade-score partitions over opaque generated groups
