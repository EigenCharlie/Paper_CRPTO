schema_version: "2026-05-12.1"
profile_name: search_pd_extensive
description: CPU-only CatBoost monotonic Optuna search for regret-auditability sandbox.
writes_canonical_artifacts: false
artifact_root_template: "D:/crpto_experiments/regret_auditability/{run_tag}"
runtime:
  no_gpu: true
  workers: 4
  catboost_threads_per_worker: 5
  reserve_logical_cpus: 2
  min_available_ram_gb: 10
  notes:
    - CatBoost GPU is available on the machine, but monotone_constraints are not usable in the GPU path for this sandbox.
    - CPU parallelism is increased to 4 workers x 5 threads with RAM gating.
model:
  base_config: configs/crpto_pd_model.yaml
  feature_config_source: data/processed/feature_config.pkl
  feature_profiles:
    core_stable:
      groups: [CATBOOST_FEATURES]
      stable_core_enabled: true
    core_wide:
      groups: [CATBOOST_FEATURES]
      stable_core_enabled: false
    core_woe:
      groups: [CATBOOST_FEATURES, WOE_FEATURES]
      stable_core_enabled: false
    bureau_high:
      groups: [CATBOOST_FEATURES, HIGH_COVERAGE_BUREAU_FEATURES]
      stable_core_enabled: false
    full_challenger:
      groups: [CHALLENGER_FEATURE_POOL_V2]
      stable_core_enabled: false
    full_challenger_woe:
      groups: [CHALLENGER_FEATURE_POOL_V2, WOE_FEATURES]
      stable_core_enabled: false
  force_params:
    task_type: CPU
    allow_writing_files: false
monotonic_policies:
  canonical_4:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
  affordability_rate_5:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
    int_rate: 1
  credit_history_7:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
    int_rate: 1
    delinq_severity: 1
    delinq_recency: -1
  bureau_utilization_11:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
    int_rate: 1
    rev_utilization: 1
    high_util_pct: 1
    bc_util: 1
    percent_bc_gt_75: 1
    fico_score: -1
    credit_age_years: -1
  bureau_behavior_15:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
    int_rate: 1
    delinq_severity: 1
    delinq_recency: -1
    pub_rec: 1
    has_bankruptcy: 1
    num_accts_ever_120_pd: 1
    num_tl_90g_dpd_24m: 1
    num_tl_30dpd: 1
    pct_tl_nvr_dlq: -1
    fico_score: -1
    credit_age_years: -1
  inquiry_velocity_12:
    installment: 1
    annual_inc: -1
    dti: 1
    loan_to_income: 1
    int_rate: 1
    inq_last_6mths: 1
    inq_last_12m: 1
    inq_fi: 1
    mths_since_recent_inq: -1
    acc_open_past_24mths: 1
    num_tl_op_past_12m: 1
    fico_score: -1
optuna:
  storage_family: rdb
  sampler: tpe
  multivariate_tpe: true
  group_tpe: true
  constant_liar: true
  constraints_policy:
    max_brier_delta: 0.0025
    max_ece_delta: 0.0025
    min_auc_delta: -0.001
  seed_replay: [42, 52, 62, 72, 82]
phases:
  smoke:
    trials_per_lane: 12
    feature_profiles: all
    monotonic_policies: all
  broad:
    trials_per_lane: 300
    select_top_lanes_from_smoke: 6
  local_refine:
    trials_per_lane: 300
    select_top_lanes_from_broad: 3
    initialize_from_previous_best_params: true
    refine_from_top_k: 30
operational_hardening:
  continue_after_failed_pd_lane: true
  per_lane_logs: true
  optuna_search_space_version: cb_space_v3_monotone_symmetric
  forced_monotone_grow_policy: SymmetricTree
