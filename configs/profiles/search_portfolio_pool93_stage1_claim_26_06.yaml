schema_version: "2026-06-25.1"
profile_name: search_portfolio_pool93_stage1_claim_26_06
description: >
  Stage-1 paper-facing portfolio search for the pool93 champion candidate.
  cuOpt 26.06 PDLP Fast1 is used only as a broad proxy-frontier discovery
  engine; HiGHS exact reranking validates the frozen shortlist on the full
  universe with five evaluation seeds before any paper-facing claim.
writes_canonical_artifacts: false
runtime:
  workers: 1
  reserve_logical_cpus: 8
  min_available_ram_gb: 10
execution:
  solver_backend: cuopt
  exact_solver_backend: highs
  frontier_only: true
candidate_policy_families:
  - blended_uncertainty
  - capped_blended_uncertainty
  - tail_blended_uncertainty
  - segment_tail_blended_uncertainty
  - segment_relative_tail_blended_uncertainty
frontier:
  proxy_candidates_per_conformal_finalist: 100000
  exact_max_candidates: 0
  exact_random_states: "42,52,62,72,82"
  exact_checkpoint_every: 25
  exact_threads: 8
  exact_rerank_top_k: 420
  bucket_return_k: 80
  bucket_proxy_k: 80
  bucket_family_k: 24
  bucket_region_k: 120
grids:
  risk_grid: "0.08,0.10,0.12,0.14,0.15,0.155,0.16,0.165,0.17,0.175,0.18,0.19,0.20,0.22,0.24,0.25"
  gamma_grid: "0,0.10,0.20,0.30,0.40,0.425,0.45,0.475,0.50,0.55,0.60,0.70,0.80,1.0"
  aversion_grid: "0,0.02,0.05,0.10,0.25"
  delta_cap_grid: "0.50,0.75,0.90,1.0"
  tail_focus_grid: "0.50,0.75,0.90,1.0"
  alpha_grid: "0.01,0.03,0.05,0.07,0.10,0.12,0.15,0.20"
  random_states: "42"
  budget_profiles: "free"
incumbent_region:
  risk_neighbors: "0.145,0.15,0.155,0.16,0.165,0.17,0.175,0.18,0.185"
  gamma_neighbors: "0.40,0.425,0.45,0.475,0.50,0.55,0.60"
  policy_modes: "blended_uncertainty,capped_blended_uncertainty,tail_blended_uncertainty,segment_tail_blended_uncertainty,segment_relative_tail_blended_uncertainty"
cuopt:
  method: PDLP
  presolve: 2
  pdlp_precision: mixed
  pdlp_solver_mode: Fast1
  crossover: false
  first_primal_feasible: false
  save_best_primal_solution: true
  infeasibility_detection: false
  dual_postsolve: false
  num_cpu_threads: 2
  num_gpus: 1
  log_to_console: false
  log_dir: auto
selection_objectives:
  - same_robust_region_higher_return
  - same_robust_region_lower_c_cp_or_bound
  - wider_region_zero_violations
  - cleaner_interpretable_region
  - return_bound_frontier
claim_targets:
  exploration_only: true
  pool93_mandatory_downstream: true
  promotion_gate: "Full-universe HiGHS exact rerank over frozen cuOpt proxy frontier shortlist"
