schema_version: "2026-05-12.1"
profile_name: search_portfolio_extensive
description: Bound-aware robust portfolio frontier search for sandbox finalists.
writes_canonical_artifacts: false
artifact_root_template: "D:/crpto_experiments/regret_auditability/{run_tag}"
runtime:
  workers: 4
  highs_threads_per_worker: 4
  reserve_logical_cpus: 2
  min_available_ram_gb: 10
candidate_policy_families:
  - blended_uncertainty
  - capped_blended_uncertainty
  - tail_blended_uncertainty
  - segment_tail_blended_uncertainty
  - segment_relative_tail_blended_uncertainty
frontier:
  proxy_candidates_per_conformal_finalist: 100000
  exact_rerank_top_k: 1000
grids:
  risk_tolerance:
    start: 0.08
    stop: 0.25
    step: 0.01
  gamma:
    start: 0.0
    stop: 1.0
    step: 0.10
  aversion: [0, 0.02, 0.05, 0.10, 0.25, 0.50]
  cap_tail_quantiles: [0.60, 0.75, 0.90, 1.0]
  alpha_exact: [0.01, 0.02, 0.03, 0.05, 0.10, 0.15, 0.20]
metrics:
  - regret
  - robust_return
  - price_of_robustness
  - V
  - Gamma_CP
  - violation
  - funded_count
