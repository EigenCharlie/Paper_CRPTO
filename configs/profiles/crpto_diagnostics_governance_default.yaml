schema_version: "2026-05-10.1"
profile_name: crpto_diagnostics_governance_default
pipeline_family: diagnostics_governance
description: >
  Lane diagnostica CRPTO para fairness, drift, MRM, backtesting e interpretacion
  de calibracion. No produce bundles de busqueda ni anexos de notebooks.
execution:
  writes_canonical_artifacts: false
  promotion_state: diagnostic_support_only
  include_rapids: false
  include_notebooks: false
  include_conformal_sensitivity: true
defaults:
  sampling_profile: champion64safe
  upstream_registry: configs/baselines/canonical_operational_baseline.json
