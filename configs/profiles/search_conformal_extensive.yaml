schema_version: "2026-05-12.1"
profile_name: search_conformal_extensive
description: Venn-Abers plus Mondrian conformal grid for the sandbox frontier.
writes_canonical_artifacts: false
artifact_root_template: "D:/crpto_experiments/regret_auditability/{run_tag}"
runtime:
  workers: 6
  reserve_logical_cpus: 2
  min_available_ram_gb: 10
calibration:
  allowed_methods: [venn_abers]
selection_protocol:
  select_on: "2018 OOT"
  confirm_on:
    - "2019-2020"
    - "stress_slices"
mondrian_families:
  - grade
  - score_decile_mondrian
  - grade_x_scoreband_mondrian
grid:
  alpha_90: [0.05, 0.075, 0.09, 0.095, 0.10, 0.105, 0.11, 0.125, 0.15, 0.20]
  alpha_95: [0.025, 0.04, 0.045, 0.05, 0.055, 0.06, 0.075]
  score_bins: [5, 10, 15, 20, 30]
  min_group_sizes: [100, 150, 250, 500, 1000, 2000]
  score_scales:
    - none
    - bernoulli_sqrt
    - bernoulli_sqrt_clipped_0.02
    - bernoulli_sqrt_clipped_0.05
metrics:
  - coverage90
  - coverage95
  - min_group_coverage
  - width
  - winkler
