schema_version: "2026-05-10.1"
profile_name: crpto_e2e_default
pipeline_family: crpto_e2e
description: >
  Perfil CRPTO paper-grade: PD champion, conformal rank 1, portfolio economic
  champion bound-aware 276K, A/B explicit_champion_only, sin busquedas nuevas.
execution:
  writes_canonical_artifacts: false
  promotion_state: paper_grade
  include_rapids: false
  include_notebooks: false
  include_conformal_sensitivity: false
defaults:
  sampling_profile: full
  upstream_registry: configs/baselines/canonical_operational_baseline.json
search_space:
  pd:
    config_path: configs/crpto_pd_model.yaml
    mode: frozen_champion
  conformal:
    partition_probability_sources: [calibrated]
    n_score_bins_candidates: [10]
    fallback_modes: [global_only]
    score_scale_families: [bernoulli_sqrt]
    min_group_sizes: [100]
    calibration_fraction: 0.5
    selection: freeze_if_available
  ab:
    execution_mode: freeze_if_available
    policy_selector_default: explicit_champion_only
    max_portfolio_pd: 0.18
    max_candidates: 0
    n_boot: 5000
    seed: 42
    no_regression_tolerance_pct: 0.05
champion:
  run_tag: paper-thesis-final-economic-2026-04-06
  policy: bound_aware_276k_economic_champion
