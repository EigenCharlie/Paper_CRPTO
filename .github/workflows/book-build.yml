name: book-build

on:
  pull_request:
    paths:
      - "book/**"
      - ".github/workflows/book-build.yml"
  push:
    branches: [main, paper-final]
    paths:
      - "book/**"

concurrency:
  group: book-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --extra dev --frozen

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Quarto check
        run: quarto check

      - name: Render book (no execute — validates markdown, uses freeze)
        run: uv run -- quarto render book --to html --no-execute

      - name: Upload rendered HTML
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: book/_book/
          retention-days: 14
