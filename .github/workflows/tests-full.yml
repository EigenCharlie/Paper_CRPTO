name: clean-clone-reproducibility

# Manually triggered clean-clone audit. It reconstructs the publication capsule
# on a disposable CPU runner; Linux is a portability check, not a scientific or
# GPU requirement.
# It remains manual because it downloads authenticated DVC artifacts and runs
# the complete suite; the lightweight lint workflow covers ordinary pushes.
#
# Trigger it from the GitHub UI (Actions > clean-clone-reproducibility).
# Use it before a paper submission or after a major scientific refactor.
#
# Required repository secrets:
# - DAGSHUB_USER_TOKEN
# - DAGSHUB_USER
# - DAGSHUB_REPO (= Paper_CRPTO)

on:
  workflow_dispatch:

concurrency:
  group: clean-clone-reproducibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean-clone:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_ENDPOINT_URL: https://dagshub.com/EigenCharlie94/Paper_CRPTO.s3
      CRPTO_REQUIRE_DVC_ARTIFACTS: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.56.0"

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.38"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --group dev --frozen

      - name: Dependency audit
        run: just dependency-audit

      - name: Pull publication DVC capsule
        run: just ijds-pull-publication

      - name: Protected extraction hash regression
        run: uv run --locked pytest tests/test_manifest_regression.py -v

      - name: Strict protected-artifact gate
        run: just validate-champion-strict

      - name: Active IJDS contract
        run: just ijds-active-check

      - name: Active implementation and evidence drift gate
        run: just drift-gate

      - name: Full author tests
        run: just coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: |
            coverage.xml
            .pytest_cache/
          retention-days: 7
          if-no-files-found: ignore
