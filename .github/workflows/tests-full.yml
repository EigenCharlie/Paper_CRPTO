name: tests-full

# Manually-triggered full test suite. Pulls protected extraction artifacts from
# the DagsHub DVC remote, checks their hashes, and runs the active IJDS suite.
# It is NOT wired to push events; that would be too expensive (and add
# zero value to a single-author academic project) to run on every commit.
#
# Trigger it from the GitHub UI (Actions tab > tests-full > Run workflow).
# Use it before a paper submission or after a major scientific refactor.
#
# Required repository secrets:
# - DAGSHUB_USER_TOKEN
# - DAGSHUB_USER
# - DAGSHUB_REPO (= Paper_CRPTO)

on:
  workflow_dispatch:

concurrency:
  group: tests-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_ENDPOINT_URL: https://dagshub.com/EigenCharlie94/Paper_CRPTO.s3
      CRPTO_REQUIRE_DVC_ARTIFACTS: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.56.0"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --group dev --frozen

      - name: Dependency audit
        run: just dependency-audit

      - name: DVC pull (active and protected artifacts)
        run: uv run --locked dvc pull --no-run-cache

      - name: Protected extraction hash regression
        run: uv run --locked pytest tests/test_manifest_regression.py -v

      - name: Strict protected-artifact gate
        run: just validate-champion-strict

      - name: Active IJDS contract
        run: just ijds-active-check

      - name: Active implementation and evidence drift gate
        run: just drift-gate

      - name: Full author tests
        run: just coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: |
            coverage.xml
            .pytest_cache/
          retention-days: 7
          if-no-files-found: ignore
