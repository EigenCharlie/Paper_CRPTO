name: dbt

on:
  pull_request:
    paths:
      - "dbt_project/**"
      - "data/processed/**"
      - ".github/workflows/dbt.yml"
  push:
    branches: [main, paper-final]
    paths:
      - "dbt_project/**"

concurrency:
  group: dbt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dbt-parse-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --extra dev --frozen

      - name: Install dbt packages
        run: uv run dbt deps --project-dir dbt_project --profiles-dir dbt_project

      - name: dbt parse
        run: uv run dbt parse --project-dir dbt_project --profiles-dir dbt_project

      - name: dbt compile
        run: uv run dbt compile --project-dir dbt_project --profiles-dir dbt_project

      # dbt test requires the DuckDB with parquets present; skip if data not available
      - name: dbt test (best-effort)
        run: uv run dbt test --project-dir dbt_project --profiles-dir dbt_project
        continue-on-error: true
