name: book-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --extra dev --frozen

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.35"

      - name: Write build metadata
        run: uv run python scripts/write_book_build_info.py

      - name: Render book (full)
        run: uv run -- quarto render book --to html --no-execute

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: book/_book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
