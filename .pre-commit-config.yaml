default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # These path-bound compatibility files must remain byte-exact.
      - id: trailing-whitespace
        exclude: '^(.*\.cbm|.*\.pkl|.*\.parquet)'
      - id: end-of-file-fixer
        exclude: '^(.*\.cbm|.*\.pkl|.*\.parquet|models/experiments/champion_reopen/champion-reopen-2026-06-19__pool93__ijds-claim-consolidated-definitive/portfolio/pool93_ijds_consolidated_governance\.json)$'
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '^book/references\.bib$'

  - repo: local
    hooks:
      - id: dvc-status
        name: active IJDS DVC status
        entry: just ijds-dvc-status
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-smoke
        name: just smoke (publication guardrails)
        entry: just smoke
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: validate-champion
        name: validate protected extraction artifacts
        entry: just validate-champion
        language: system
        pass_filenames: false
        stages: [pre-push]
