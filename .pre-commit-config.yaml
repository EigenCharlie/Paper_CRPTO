default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(book/_freeze/|book/_book/|.*\.cbm|.*\.pkl|.*\.parquet)'
      - id: end-of-file-fixer
        exclude: '^(book/_freeze/|book/_book/|.*\.cbm|.*\.pkl|.*\.parquet)'
      - id: check-yaml
        exclude: 'dbt_project/profiles\.yml'
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=2000]
        exclude: '^(EXTRACTION_MANIFEST\.json|models/.*\.cbm|models/.*\.pkl|book/_freeze/|book/_book/|book/apa\.csl|book/assets/figures/editorial/diagrama-crpto\.png)'
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  - repo: local
    hooks:
      # mypy is intentionally not enforced locally while the legacy codebase is
      # gradually annotated. Keep strict checks scoped to the modules that opt in.

      - id: dvc-status
        name: dvc status (non-blocking drift report)
        entry: uv run python scripts/check_dvc_status_warning.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-smoke
        name: just smoke (publication guardrails)
        entry: just smoke
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: validate-champion
        name: validate champion artefacts
        entry: just validate-champion
        language: system
        pass_filenames: false
        stages: [pre-push]
